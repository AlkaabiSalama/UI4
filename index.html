<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EarthMonitor – Dynamic World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    :root {
      --bg: #111827;
      --panel: #1f2933;
      --border: #374151;
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; margin:0; padding:0; }

    body {
      font-family: system-ui;
      background: radial-gradient(circle,#111827,#020617);
      color: var(--text);
    }

    header {
      padding: 16px;
      border-bottom:1px solid var(--border);
      display:flex;
      justify-content:space-between;
    }

    h1 { font-size:26px; }

    .layout {
      display:grid;
      grid-template-columns:280px 1fr;
      height: calc(100vh - 70px);
    }

    /* sidebar */
    .sidebar {
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .box {
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
    }

    .chat-messages {
      height:140px;
      overflow-y:auto;
      border:1px solid var(--border);
      margin:6px 0;
      padding:6px;
      background:#020617;
    }

    .bubble {
      padding:6px;
      margin-bottom:6px;
      border-radius:8px;
      font-size:12px;
    }

    .bot { background:#111827; }
    .user { background:#2563eb; }

    .row { display:flex; gap:6px; }

    select, input {
      width:100%;
      padding:6px;
      background:#020617;
      border:1px solid var(--border);
      color:white;
      border-radius:6px;
    }

    button {
      background:var(--accent);
      border:none;
      color:white;
      padding:6px 10px;
      border-radius:20px;
      cursor:pointer;
    }

    /* map */
    .map-area {
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .map-grid {
      display:flex;
      gap:10px;
      flex:1;
    }

    .map-box {
      flex:1;
      display:flex;
      flex-direction:column;
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
    }

    .map-header {
      font-size:12px;
      padding:4px;
      border-bottom:1px solid var(--border);
    }

    .map {
      flex:1;
    }

    #mapA,#mapB { height:100%; }

    /* legend */
    .legend {
      position:absolute;
      bottom:10px;
      right:10px;
      background:#020617;
      padding:8px;
      border-radius:10px;
      border:1px solid var(--border);
      z-index:9999;
    }

    .legend div { font-size:11px; margin-bottom:2px; }

    .legend span {
      display:inline-block;
      width:10px;height:10px;
      margin-right:4px;
    }

    /* report */
    .report {
      border:1px solid var(--border);
      padding:10px;
      border-radius:10px;
      font-size:12px;
    }

  </style>
</head>
<body>

<header>
  <div>
    <h1>EarthMonitor</h1>
    <small>Dynamic World monitoring</small>
  </div>
</header>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="box">
  <b>Mode</b><br>
  <label><input type="radio" name="mode" value="change_detection" checked> Change</label><br>
  <label><input type="radio" name="mode" value="single_year"> Single</label><br>
  <label><input type="radio" name="mode" value="timeseries"> Time Series</label>

  <hr>

  <b>Years</b>
  <div class="row">
    <select id="yearA"></select>
    <select id="yearB"></select>
  </div>

  <hr>

  <b>City</b>
  <input id="city" placeholder="Dubai, Berlin..." />
</div>

<div class="box" id="video-tools" style="display:none;">
  <button onclick="generateVideo()">Generate Video</button>
  <div id="video-status"></div>
  <a id="video-link" style="display:none">Download</a>
</div>

<div class="box">
  <b>Assistant</b>
  <div class="chat-messages" id="chat"></div>
  <div class="row">
    <input id="chatInput">
    <button onclick="sendChat()">Send</button>
  </div>
</div>

</div>

<!-- MAP AREA -->
<div class="map-area">

<div class="map-grid">
  <div class="map-box">
    <div class="map-header" id="labelA">Before</div>
    <div id="mapA" class="map"></div>
  </div>
  <div class="map-box" id="boxB">
    <div class="map-header" id="labelB">After</div>
    <div id="mapB" class="map"></div>
  </div>
</div>

<div class="legend" id="legend"></div>

<div class="report" id="summary">
  Summary appears here
</div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API_BASE = "";

// populate years
const years = [2017,2018,2019,2020,2021,2022,2023,2024];
const yearA = document.getElementById("yearA");
const yearB = document.getElementById("yearB");
years.forEach(y=>{
  yearA.innerHTML+=`<option>${y}</option>`;
  yearB.innerHTML+=`<option>${y}</option>`;
});
yearA.value=2020;
yearB.value=2022;

// maps
const sat = "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}";
const mapA = L.map("mapA").setView([26,55],4);
const mapB = L.map("mapB").setView([26,55],4);

const satA = L.tileLayer(sat).addTo(mapA);
const satB = L.tileLayer(sat).addTo(mapB);

let layerA,layerB,changeA,changeB;

function mode(){
  return document.querySelector('input[name="mode"]:checked').value;
}

// legend
const classes=[
["Water","#419bdf"],["Trees","#397d49"],["Grass","#88b053"],
["Flood","#7a87c6"],["Crops","#e49635"],["Shrub","#dfc35a"],
["Built","#c4281b"],["Bare","#a59b8f"],["Snow","#b39fe1"]
];
legend.innerHTML="<b>Dynamic World</b><br>"+classes.map(c=>`<div><span style="background:${c[1]}"></span>${c[0]}</div>`).join("");

// update UI
function updateUI(){
  if(mode()=="single_year"){
    yearB.style.display="none";
    boxB.style.display="none";
  } else {
    yearB.style.display="block";
    boxB.style.display="block";
  }

  document.getElementById("video-tools").style.display =
    mode()=="timeseries"?"block":"none";
}

// load map
async function loadMap(){
  updateUI();

  const res = await fetch("/map-config",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      mode:mode(),
      year_a:+yearA.value,
      year_b:+yearB.value,
      city:city.value
    })
  });

  const data = await res.json();

  mapA.setView([data.center_lat,data.center_lon],11);
  mapB.setView([data.center_lat,data.center_lon],11);

  if(layerA) mapA.removeLayer(layerA);
  if(layerB) mapB.removeLayer(layerB);
  if(changeA) mapA.removeLayer(changeA);
  if(changeB) mapB.removeLayer(changeB);

  if(data.tiles.a) layerA=L.tileLayer(data.tiles.a).addTo(mapA);
  if(data.tiles.b) layerB=L.tileLayer(data.tiles.b).addTo(mapB);
  if(data.tiles.change){
    changeA=L.tileLayer(data.tiles.change).addTo(mapA);
    changeB=L.tileLayer(data.tiles.change).addTo(mapB);
  }

  labelA.innerText="Year "+data.year_a;
  labelB.innerText="Year "+data.year_b;

}

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("change",loadMap);
});

loadMap();

// chat
function addMsg(role,text){
  chat.innerHTML+=`<div class="bubble ${role}">${text}</div>`;
  chat.scrollTop=chat.scrollHeight;
}

async function sendChat(){
  const text=chatInput.value;
  addMsg("user",text);

  // simple location detection
  if(text.toLowerCase().includes("dubai")) city.value="Dubai";
  if(text.toLowerCase().includes("berlin")) city.value="Berlin";

  await loadMap();

  const res = await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      message:text,
      mode:mode(),
      year_a:+yearA.value,
      year_b:+yearB.value,
      city:city.value
    })
  });

  const data = await res.json();
  addMsg("bot",data.reply);
  summary.innerText=data.summary;

  chatInput.value="";
}

// video
async function generateVideo(){
  video-status.innerText="Generating...";
  const res = await fetch("/timeseries-video",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      year_a:+yearA.value,
      year_b:+yearB.value,
      city:city.value
    })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  video-link.href=url;
  video-link.style.display="block";
  video-link.innerText="Download video";

  video-status.innerText="Done";
}

</script>
</body>
</html>
